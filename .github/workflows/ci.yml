name: Laravel Build

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - run: composer install
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: php artisan test
