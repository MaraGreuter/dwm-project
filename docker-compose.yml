services:
  app:
    image: greutermara/dwm-project:latest
    ports:
      - "8080:80"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dwm_project
      DB_USERNAME: root
      DB_PASSWORD: root
      APP_ENV: local
      APP_DEBUG: "true"
      SESSION_DRIVER: database
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_DATABASE: dwm_project
      MYSQL_ROOT_PASSWORD: root
