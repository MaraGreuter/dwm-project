services:
  app:
    image: greutermara/dwm-project:latest
    container_name: dwm_project_container
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      db_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: root
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:RnI937QlEQnI5eRNlVwZQfGPogCg8zBNeORFl4Z0Ecc=
      SESSION_DRIVER: file


  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
