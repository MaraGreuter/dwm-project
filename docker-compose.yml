services:
  app:
    image: greutermara/dwm-project:latest
    container_name: dwm_project_container
    ports:
      - "8080:80"
    command: php artisan serve --host=0.0.0.0 --port=80
    environment:
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:RnI937QlEQnI5eRNlVwZQfGPogCg8zBNeORFl4Z0Ecc=
      SESSION_DRIVER: file
